apiVersion: v1
kind: Pod
metadata:
  name: static-pinned
  labels:
    app.kubernetes.io/name: static-pinned
spec:
  nodeName: minikube
  containers:
  - name: static-pinned
    image: nginx:latest
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "100Mi"
        cpu: "300m"
    ports:
      - containerPort: 80
