apiVersion: v1
kind: Pod
metadata:
  name: affinity-demo
  labels:
    app.kubernetes.io/name: affinity-demo
spec:
  affinity:
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: disktype
                operator: In
                values: ['ssd']
  containers:
  - name: affinity-demo
    image: nginx:latest
    resources:
      limits:
        memory: "128Mi"
        cpu: "500m"
      requests:
        memory: "100Mi"
        cpu: "300m"
    ports:
      - containerPort: 80
